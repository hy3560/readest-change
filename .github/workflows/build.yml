name: Flutter Professional Build (OOM Resistant)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动点击触发

# 全局环境变量：启用 Node.js 24 兼容模式，解决日志中的告警
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    # 矩阵策略：分别开启 Linux 和 Windows 两台虚拟机并行构建
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false # 即使一个失败，另一个也要继续跑完
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            output_path: build/app/outputs/flutter-apk/app-release.apk
          - os: windows-latest
            platform: windows
            output_path: build/windows/x64/runner/Release/

    steps:
      # 1. 检出源代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (仅 Android)
      - name: Set up Java 17
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 设置 Flutter SDK (最新 Stable)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. 缓存 Pub 依赖
      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 5. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 【核心：环境修复】解决找不到 gradle 文件的问题
      # 无论仓库里有没有 android/windows 目录，这行代码都会确保云端环境完整
      - name: Repair and Initialize Platform Projects
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=android,windows .

      # 7. 【核心：Android 构建】彻底解决 OOM
      - name: Build Android APK
        if: matrix.platform == 'android'
        run: |
          # 策略说明：
          # -Xmx2560m: 将 Java 堆限制在 2.5G，留出足够空间给系统和 Dart
          # org.gradle.daemon=false: 不使用守护进程，用完即删内存
          # org.gradle.parallel=false: 禁止并行，防止瞬时峰值内存溢出
          # org.gradle.workers.max=1: 强制单线程编译
          flutter build apk --release \
            --dart-define=GRADLE_OPTS="-Xmx2560m -Dorg.gradle.jvmargs=-Xmx2560m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"

      # 8. 【核心：Windows 构建】
      - name: Build Windows EXE
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      # 9. 产物收集 - Android (APK)
      - name: Upload Android Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release-APK
          path: ${{ matrix.output_path }}

      # 10. 产物收集 - Windows (包含 exe 和所有依赖 dll)
      - name: Upload Windows Artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release-Package
          path: ${{ matrix.output_path }}