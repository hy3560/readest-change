name: Flutter Build Dual-Platform

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: ubuntu-latest
            platform: apk
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        if: matrix.platform == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # 暂时关闭 Gradle 缓存路径检查，避免因文件夹缺失导致的初始化失败
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --- 核心修复步骤：如果文件夹不存在，强制创建平台环境 ---
      - name: Auto-Repair Project Structure
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=android,windows .

      # --- 构建 Android APK (解决内存溢出) ---
      - name: Build Android APK
        if: matrix.platform == 'apk'
        run: |
          flutter build apk --release \
            --dart-define=GRADLE_OPTS="-Xmx2g -Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"

      # --- 构建 Windows EXE ---
      - name: Build Windows EXE
        if: matrix.platform == 'windows'
        run: |
          flutter build windows --release

      # --- 产物收集 ---
      - name: Upload Android Artifact
        if: matrix.platform == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Windows Artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release-EXE
          path: build/windows/x64/runner/Release/