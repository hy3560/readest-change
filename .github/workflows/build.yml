name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Reconstruct Project (All Platforms)
        # 一次性生成安卓和 Windows 的原生配置文件
        run: flutter create . --platforms=android,windows --project-name=readest_change

      # --- 安卓配置修复 ---
      - name: Patch Android (Permissions & Kotlin)
        run: |
          # 注入联网权限
          $manifestPath = "android/app/src/main/AndroidManifest.xml"
          $permission = '<uses-permission android:name="android.permission.INTERNET" />'
          (Get-Content $manifestPath) -replace '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', "<manifest xmlns:android=`"http://schemas.android.com/apk/res/android`">`n    $permission" | Set-Content $manifestPath
          
          # 修正 Kotlin 版本兼容性
          $gradlePath = "android/build.gradle"
          if (Test-Path $gradlePath) {
            (Get-Content $gradlePath) -replace "ext.kotlin_version = '.*'", "ext.kotlin_version = '1.9.0'" | Set-Content $gradlePath
          }

      # --- Windows 配置优化 ---
      - name: Configure Windows Desktop
        run: |
          # 开启 Windows 端的网络访问支持（通过运行配置确保）
          flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Windows EXE
        # 编译生成 Windows 运行文件
        run: flutter build windows --release

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Readest-Full-Platform-Release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/