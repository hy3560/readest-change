name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Reconstruct Flutter Project
        run: flutter create . --platforms=android,windows --project-name=readest_change

      - name: Advanced Patch for Pro Reader
        run: |
          $settingsPath = "android/settings.gradle"
          if (Test-Path $settingsPath) {
            $content = Get-Content $settingsPath -Raw
            $content = $content -replace 'id\s+["'']org\.jetbrains\.kotlin\.android["'']\s+version\s+["''][0-9\.]+["'']', 'id "org.jetbrains.kotlin.android" version "1.9.24"'
            Set-Content -Path $settingsPath -Value $content
          }


          $rootGradle = "android/build.gradle"
          if (Test-Path $rootGradle) {
             $content = Get-Content $rootGradle -Raw
             $content = $content -replace "mavenCentral\(\)", "mavenCentral()`n        maven { url 'https://jitpack.io' }"
             Set-Content -Path $rootGradle -Value $content
          }

          Add-Content -Path "android/gradle.properties" -Value "`nkotlin.incremental=false"

          $manifest = "android/app/src/main/AndroidManifest.xml"
          $perm = '<uses-permission android:name="android.permission.INTERNET" />'
          (Get-Content $manifest) -replace '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', "<manifest xmlns:android=`"http://schemas.android.com/apk/res/android`">`n    $perm" | Set-Content $manifest

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-pub

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Readest-Pro-Release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/