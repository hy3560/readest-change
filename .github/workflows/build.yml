name: Flutter Professional Multi-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行

# 全局环境变量：启用 Node.js 24 兼容模式，解决旧 Action 告警
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    # 使用矩阵策略：GitHub 将开启两台独立的虚拟机并行工作
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false # 即使一个平台失败，另一个也要继续完成
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            output_path: build/app/outputs/flutter-apk/app-release.apk
          - os: windows-latest
            platform: windows
            output_path: build/windows/x64/runner/Release/

    steps:
      # 1. 检出源代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (仅 Android 构建需要)
      - name: Set up Java 17
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 设置 Flutter SDK (最新 Stable)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. 缓存 Pub 依赖 (缩短构建时间)
      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 5. 获取依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 【核心：环境补全】解决 "No Windows project configured" 或缺少 android 目录的问题
      # 即使你本地 .gitignore 过滤了这些文件夹，云端也会根据 pubspec.yaml 自动补齐
      - name: Repair and Initialize Platform Projects
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=android,windows .

      # 7. 【核心：Android 构建】彻底解决内存溢出 (OOM)
      # 参数说明：
      # -Xmx2560m: 限制 JVM 堆内存为 2.5G
      # org.gradle.daemon=false: 构建完立即销毁进程释放内存
      # org.gradle.parallel=false: 禁止并行编译，防止瞬时内存峰值
      # org.gradle.workers.max=1: 强制单线程，确保稳定性
      - name: Build Android APK
        if: matrix.platform == 'android'
        run: |
          flutter build apk --release \
            --dart-define=GRADLE_OPTS="-Xmx2560m -Dorg.gradle.jvmargs=-Xmx2560m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"

      # 8. 【核心：Windows 构建】
      - name: Build Windows EXE
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      # 9. 产物收集 - Android (APK 文件)
      - name: Upload Android Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release-APK
          path: ${{ matrix.output_path }}
          retention-days: 7

      # 10. 产物收集 - Windows (整个 Release 文件夹，包含 dll 依赖)
      - name: Upload Windows Artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release-Package
          path: ${{ matrix.output_path }}
          retention-days: 7