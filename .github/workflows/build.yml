name: Flutter Multi-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动在 GitHub 页面点击触发

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    # 矩阵策略：GitHub 会根据设置自动开启 2 台虚拟机（1台 Ubuntu, 1台 Windows）同时跑
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false # 即使一个平台构建失败，另一个也要继续跑完
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            output_path: build/app/outputs/flutter-apk/app-release.apk
          - os: windows-latest
            platform: windows
            output_path: build/windows/x64/runner/Release/

    steps:
      # 1. 检出源代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (仅 Android 需要)
      - name: Set up Java 17
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. 设置 Flutter SDK 并开启缓存
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. 手动缓存 Pub 依赖，进一步缩短时间
      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 5. 获取依赖
      - name: Install dependencies
        run: flutter pub get

      # 6. 环境自愈：如果仓库没提交平台文件夹，则自动创建
      - name: Repair Project Structure
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=android,windows .

      # 7. 【核心步骤】构建 Android APK (解决 OOM)
      - name: Build Android APK
        if: matrix.platform == 'android'
        run: |
          # 核心内存限制参数：
          # -Xmx3072m: 限制 JVM 堆内存为 3G
          # org.gradle.daemon=false: 禁用守护进程，构建完立即释放内存
          # org.gradle.parallel=false: 禁止并行编译，防止内存瞬时峰值
          # org.gradle.workers.max=1: 强制单线程工作
          flutter build apk --release \
            --dart-define=GRADLE_OPTS="-Xmx3072m -Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"

      # 8. 【核心步骤】构建 Windows EXE
      - name: Build Windows EXE
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      # 9. 产物收集 - Android
      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release-APK
          path: ${{ matrix.output_path }}

      # 10. 产物收集 - Windows (自动压缩 Release 文件夹)
      - name: Upload Windows EXE
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release-Package
          path: ${{ matrix.output_path }}