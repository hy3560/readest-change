name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Reconstruct Flutter Project
        run: flutter create . --platforms=android --project-name=readest_change

      # 关键修复点：强行将 Kotlin 版本升级到 1.9.0 以匹配 Flutter 3.24
      - name: Patch Kotlin Version
        run: |
          $path = "android/build.gradle"
          if (Test-Path $path) {
            (Get-Content $path) -replace "ext.kotlin_version = '.*'", "ext.kotlin_version = '1.9.0'" | Set-Content $path
          }
          $path2 = "android/settings.gradle"
          if (Test-Path $path2) {
             (Get-Content $path2) -replace 'id "org.jetbrains.kotlin.android" version ".*"', 'id "org.jetbrains.kotlin.android" version "1.9.0" apply false' | Set-Content $path2
          }

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Readest-Private-Release
          path: build/app/outputs/flutter-apk/app-release.apk