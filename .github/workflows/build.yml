name: Flutter Build Dual-Platform

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 支持手动点击触发构建

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false # 即使一个平台失败，另一个也继续跑完
      matrix:
        include:
          - os: ubuntu-latest
            platform: apk
            output_path: build/app/outputs/flutter-apk/app-release.apk
          - os: windows-latest
            platform: windows
            output_path: build/windows/x64/runner/Release/

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 设置 Java 环境 (仅 Android 需要)
      - name: Set up Java 17
        if: matrix.platform == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 设置 Flutter SDK 并开启缓存
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter"

      - name: Install dependencies
        run: flutter pub get

      # --- 构建 Android APK ---
      - name: Build Android APK
        if: matrix.platform == 'apk'
        run: |
          # 核心防溢出参数：禁用并行编译，禁用守护进程，限制JVM堆内存
          flutter build apk --release \
            --dart-define=GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2560m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"

      # --- 构建 Windows EXE ---
      - name: Build Windows EXE
        if: matrix.platform == 'windows'
        run: |
          # 针对日志中的 "No Windows desktop project configured" 进行强制修复
          flutter config --enable-windows-desktop
          if (!(Test-Path "windows")) { flutter create --platforms=windows . }
          flutter build windows --release

      # --- 上传 Android 产物 ---
      - name: Upload Android Artifact
        if: matrix.platform == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release-APK
          path: ${{ matrix.output_path }}
          retention-days: 7

      # --- 上传 Windows 产物 (整个 Release 文件夹) ---
      - name: Upload Windows Artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release-EXE
          path: ${{ matrix.output_path }}
          retention-days: 7