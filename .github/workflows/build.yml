name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Reconstruct Full Project
        run: |
          flutter create . --platforms=android,windows --project-name=readest_change
          flutter pub get

      - name: Advanced Android Patch
        run: |
          $appGradle = "android/app/build.gradle"
          (Get-Content $appGradle) -replace "compileSdk = flutter.compileSdkVersion", "compileSdk = 35" | Set-Content $appGradle
          
          $rootGradle = "android/build.gradle"
          $jitpack = "allprojects { repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } } }"
          Add-Content -Path $rootGradle -Value "`n$jitpack"

          $manifest = "android/app/src/main/AndroidManifest.xml"
          $perm = '<uses-permission android:name="android.permission.INTERNET" />'
          (Get-Content $manifest) -replace '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', "<manifest xmlns:android=`"http://schemas.android.com/apk/res/android`">`n    $perm" | Set-Content $manifest

      - name: Build Android APK
        run: flutter build apk --release --no-pub

      - name: Build Windows App
        run: flutter build windows --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Readest-Final-Build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/