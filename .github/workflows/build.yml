name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Reconstruct Project
        run: flutter create . --platforms=android,windows --project-name=readest_change

      - name: Patch Android Configurations
        run: |
          $manifestPath = "android/app/src/main/AndroidManifest.xml"
          $permission = '<uses-permission android:name="android.permission.INTERNET" />'
          (Get-Content $manifestPath) -replace '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', "<manifest xmlns:android=`"http://schemas.android.com/apk/res/android`">`n    $permission" | Set-Content $manifestPath
          
          $wrapperPath = "android/gradle/wrapper/gradle-wrapper.properties"
          $wrapperContent = @"
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https://services.gradle.org/distributions/gradle-7.6.3-all.zip
          "@
          Set-Content -Path $wrapperPath -Value $wrapperContent -Encoding Ascii

          $gradlePath = "android/build.gradle"
          if (Test-Path $gradlePath) {
            (Get-Content $gradlePath) -replace "ext.kotlin_version = '.*'", "ext.kotlin_version = '1.9.0'" | Set-Content $gradlePath
          }
          $settingsPath = "android/settings.gradle"
          if (Test-Path $settingsPath) {
            (Get-Content $settingsPath) -replace 'id "org.jetbrains.kotlin.android" version ".*"', 'id "org.jetbrains.kotlin.android" version "1.9.0" apply false' | Set-Content $settingsPath
          }

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-pub

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Upload Global Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Readest-International-Release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/