name: Flutter Build Dual-Platform

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: apk
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 【关键：优化 Android 环境】
      - name: Set up Java 17
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # 自动缓存 Gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 【针对 OOM 的终极解决方案】
      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. 强制在构建前清理内存
          flutter clean
          # 2. 使用极低的内存占用参数
          # -Xmx2g: 限制 Java 堆内存为 2GB，留出更多给系统和 Dart
          # org.gradle.workers.max=1: 禁止多线程并行编译，防止瞬间内存暴涨
          flutter build apk --release \
            --dart-define=GRADLE_OPTS="-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"

      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          flutter clean
          flutter build windows --release

      # 收集产物
      - name: Upload APK
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Windows Release
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-exe
          path: build/windows/x64/runner/Release/