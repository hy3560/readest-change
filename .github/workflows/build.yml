name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Reconstruct Project
        run: flutter create . --platforms=android,windows --project-name=readest_change

      - name: Essential Android Patch
        run: |
          $manifest = "android/app/src/main/AndroidManifest.xml"
          $perm = '<uses-permission android:name="android.permission.INTERNET" />'
          (Get-Content $manifest) -replace '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', "<manifest xmlns:android=`"http://schemas.android.com/apk/res/android`">`n    $perm" | Set-Content $manifest

          $settingsPath = "android/settings.gradle"
          if (Test-Path $settingsPath) {
            (Get-Content $settingsPath) -replace 'id "org.jetbrains.kotlin.android" version ".*"', 'id "org.jetbrains.kotlin.android" version "1.9.0" apply false' | Set-Content $settingsPath
          }
          $buildPath = "android/build.gradle"
          if (Test-Path $buildPath) {
            (Get-Content $buildPath) -replace "ext.kotlin_version = '.*'", "ext.kotlin_version = '1.9.0'" | Set-Content $buildPath
          }

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Readest-Lite-Release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/