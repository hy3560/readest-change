name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Reconstruct Project
        run: flutter create . --platforms=android,windows --project-name=readest_change

      - name: Force Patch Android Configurations
        run: |
          # 1. 注入联网权限
          $manifestPath = "android/app/src/main/AndroidManifest.xml"
          $permission = '<uses-permission android:name="android.permission.INTERNET" />'
          (Get-Content $manifestPath) -replace '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', "<manifest xmlns:android=`"http://schemas.android.com/apk/res/android`">`n    $permission" | Set-Content $manifestPath
          
          # 2. 强力修复 Kotlin 版本 (兼容新旧两种配置方式)
          # 旧版方式: build.gradle
          $gradlePath = "android/build.gradle"
          if (Test-Path $gradlePath) {
            (Get-Content $gradlePath) -replace "ext.kotlin_version = '.*'", "ext.kotlin_version = '1.9.0'" | Set-Content $gradlePath
          }
          
          # 新版方式: settings.gradle (Flutter 3.19+ 常用)
          $settingsPath = "android/settings.gradle"
          if (Test-Path $settingsPath) {
            (Get-Content $settingsPath) -replace 'id "org.jetbrains.kotlin.android" version ".*"', 'id "org.jetbrains.kotlin.android" version "1.9.0" apply false' | Set-Content $settingsPath
          }

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Windows App
        run: flutter build windows --release

      - name: Upload Multi-Platform Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Readest-Full-Version
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/