name: Cloud Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Reconstruct Project
        run: flutter create . --platforms=android,windows --project-name=readest_change

      - name: Patch Kotlin (For Android)
        run: |
          $path = "android/build.gradle"
          if (Test-Path $path) {
            (Get-Content $path) -replace "ext.kotlin_version = '.*'", "ext.kotlin_version = '1.9.0'" | Set-Content $path
          }

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Readest-MultiPlatform-Release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/